<!doctype html>
<!--
  复制本模板到 pages/<分类>/<topic>.html，并按以下规则替换：
  1. ../../  路径前缀对应深度 = 2（pages/<分类>/）
  2. 替换标题、元信息、tag、source ref
  3. 替换 breadcrumb 中的分类与标题
  4. 同步更新 assets/data/topics.json 与 assets/data/code-map.json
  5. 运行 python guide/scripts/bundle-data.py 刷新 site-data.js
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>专题标题 - vLLM Visual Guide</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body data-page-id="topic-id">
  <header class="site-header">
    <a class="brand" href="../../index.html">vLLM Visual Guide</a>
  </header>
  <main class="topic-page">
    <nav class="breadcrumb"><a href="../../index.html">首页</a><span>/</span><span>分类</span><span>/</span><span>专题标题</span></nav>

    <section class="topic-hero panel">
      <div class="card-meta"><span>category</span><span>level</span><span class="status">status</span><span>0 min</span></div>
      <h1>专题标题</h1>
      <p class="hero-text">一句话描述。</p>
      <div class="tags"><span class="tag">标签</span></div>
    </section>

    <section class="panel">
      <h2>心智模型</h2>
      <div class="placeholder">放一张概念图或简化流程图，帮助读者建立心智模型。</div>
    </section>

    <section class="panel">
      <h2>交互演示</h2>
      <div class="placeholder">在这里接入流程图、step player 或拓扑动画。<br>数据建议存放在 assets/data/&lt;id&gt;-steps.json。</div>
    </section>
  </main>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
